<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Digital Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-bolt"></i> Digital Store
      </a>
      <div class="header-actions">
        <a href="index.html" class="btn-outline"><i class="fa-solid fa-arrow-left"></i> Back to Shop</a>
      </div>
    </div>
  </header>

  <section class="checkout-section">
    <div class="container checkout-grid">

      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div id="checkoutItems" class="checkout-items"></div>
        <div class="order-totals">
          <div class="total-row"><span>Subtotal</span><strong id="checkoutSubtotal">$0.00</strong></div>
          <div class="total-row"><span>Shipping</span><strong>$20.00</strong></div>
          <div class="total-row total-final"><span>Total</span><strong id="checkoutTotal">$0.00</strong></div>
        </div>
      </div>

      <!-- Checkout Form -->
      <div class="checkout-form-wrap">
        <h2>Shipping Details</h2>
        <form id="checkoutForm" class="checkout-form">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" name="firstName" placeholder="John" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="lastName" placeholder="Doe" required>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="+20 1XX XXX XXXX" required>
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" placeholder="123 Street, City" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" name="city" placeholder="Cairo" required>
            </div>
            <div class="form-group">
              <label>Postal Code</label>
              <input type="text" name="postal" placeholder="11511">
            </div>
          </div>

          <h3 style="margin-top:2rem">Payment Method</h3>
          <div class="payment-options">
            <label class="payment-opt">
              <input type="radio" name="payment" value="cod" checked>
              <span><i class="fa-solid fa-money-bill-wave"></i> Cash on Delivery</span>
            </label>
            <label class="payment-opt">
              <input type="radio" name="payment" value="card">
              <span><i class="fa-solid fa-credit-card"></i> Credit / Debit Card</span>
            </label>
          </div>

          <button type="submit" class="btn-primary btn-block btn-lg" id="placeOrderBtn">
            <i class="fa-solid fa-check"></i> Place Order
          </button>
        </form>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg" style="display:none">
          <i class="fa-solid fa-circle-check"></i>
          <h3>Order Placed!</h3>
          <p>Thank you! We'll contact you soon to confirm your order.</p>
          <a href="index.html" class="btn-primary">Continue Shopping</a>
        </div>
      </div>

    </div>
  </section>

  <script src="JS/products.js"></script>
  <script src="JS/cart.js"></script>
  <script src="JS/checkout.js"></script>
</body>
</html>
